<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Links Profile</title>
    <link rel="stylesheet" href="social-links-profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main_container">
        <div class="social_profile_card">
            <img src="./assets/avatar-jessica.jpeg" alt="profile picture" class="avatar">
            <figcaption>
                <h2>Jessica Randall</h2>
                <p class="location">London, United Kingdom</p>
                <p class="bio">"Front-end developer and avid reader"</p>
            </figcaption>
            <ul class="social_links">
                <li class="link"><a href="https://github.com/" target="_blank">GitHub</a></li>
                <li class="link"><a href="https://github.com/frontendmentorio" target="_blank">Frontend Mentor</a></li>
                <li class="link"><a href="https://www.linkedin.com/" target="_blank">LinkedIn</a></li>
                <li class="link"><a href="https://x.com/" target="_blank">Twitter</a></li>
                <li class="link"><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
